<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}WB Data Browser{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script src="/static/app.js" defer></script>
</head>
<body class="h-full">

<!-- Navigation -->
<nav class="bg-white shadow-sm border-b border-gray-200">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-16">
            <div class="flex">
                <a href="/" class="flex items-center px-2 text-xl font-bold text-blue-700">
                    WB Data Browser
                </a>
                <div class="hidden sm:ml-8 sm:flex sm:space-x-6">
                    <a href="/" class="inline-flex items-center px-1 pt-1 text-sm font-medium text-gray-700 hover:text-blue-600 border-b-2 border-transparent hover:border-blue-500">
                        Dashboard
                    </a>
                    <a href="/download" class="inline-flex items-center px-1 pt-1 text-sm font-medium text-gray-700 hover:text-blue-600 border-b-2 border-transparent hover:border-blue-500">
                        Download Data
                    </a>
                    <a href="/jobs" class="inline-flex items-center px-1 pt-1 text-sm font-medium text-gray-700 hover:text-blue-600 border-b-2 border-transparent hover:border-blue-500">
                        Jobs
                    </a>
                    <a href="/browse" class="inline-flex items-center px-1 pt-1 text-sm font-medium text-gray-700 hover:text-blue-600 border-b-2 border-transparent hover:border-blue-500">
                        Browse Data
                    </a>
                    <a href="/docs" target="_blank" class="inline-flex items-center px-1 pt-1 text-sm font-medium text-gray-400 hover:text-blue-600 border-b-2 border-transparent hover:border-blue-500">
                        API Docs
                    </a>
                </div>
            </div>
        </div>
    </div>
</nav>

<!-- Flash messages -->
{% if flash_message %}
<div class="max-w-7xl mx-auto px-4 mt-4">
    <div class="rounded-md bg-green-50 p-4 border border-green-200">
        <p class="text-sm text-green-700">{{ flash_message }}</p>
    </div>
</div>
{% endif %}

<!-- Main content -->
<main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    {% block content %}{% endblock %}
</main>

<!-- Footer -->
<footer class="border-t border-gray-200 mt-auto">
    <div class="max-w-7xl mx-auto px-4 py-4 text-center text-sm text-gray-400">
        World Bank Data Browser &mdash; Data sourced from the
        <a href="https://data.worldbank.org/" class="text-blue-500 hover:underline" target="_blank">World Bank Open Data</a>
    </div>
</footer>

</body>
</html>
