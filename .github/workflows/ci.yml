name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build test image
        run: docker build --target test -t wb-data-app:test -f docker/Dockerfile .

      - name: Run linter
        run: docker run --rm wb-data-app:test ruff check .

  test:
    runs-on: ubuntu-latest
    needs: lint
    # Layer the CI overlay so the app image is built from the `test` stage
    # (pytest/ruff/mypy included). Prod builds stay lean via docker-compose.yml.
    env:
      COMPOSE_FILE: docker-compose.yml:docker-compose.ci.yml
    steps:
      - uses: actions/checkout@v4

      - name: Create test env file
        run: |
          cat > .env <<EOF
          DB_HOST=db
          DB_PORT=5432
          DB_NAME=wb_web_app
          DB_USER=user
          DB_PASSWORD=password
          WB_API_BASE_URL=https://api.worldbank.org/v2
          APP_ENV=test
          APP_PORT=8000
          APP_DEBUG=false
          EOF

      - name: Build and start services
        run: docker compose up -d --build --wait

      - name: Run tests
        # Test deps (pytest, pytest-cov, pytest-asyncio) are baked into the image
        # via the `test` stage (see docker-compose.ci.yml). No runtime pip install.
        run: docker compose exec -T app pytest tests/ -v --tb=short

      - name: Shut down
        if: always()
        run: docker compose down -v
